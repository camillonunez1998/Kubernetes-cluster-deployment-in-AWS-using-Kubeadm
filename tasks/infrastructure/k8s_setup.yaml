---
- name: Install Containerd Fast
  hosts: all
  become: true
  tasks:
    - name: 1. Install containerd
      ansible.builtin.apt:
        name: containerd
        state: present
        update_cache: yes

    - name: 2. Generate default config (The K8s Must)
      ansible.builtin.shell: |
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: 3. Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        enabled: yes

- name: Install the combo kubectl + kubelet + kubeadm
  hosts: all
  become: true
  tasks:
    - name: 4. Install dependencies for K8s
      ansible.builtin.apt:
        name: [apt-transport-https, ca-certificates, curl, gpg]
        state: present
        update_cache: yes

    - name: 5. Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    # - name: 6. Download Kubernetes GPG key
    #   ansible.builtin.get_url:
    #     url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
    #     dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    #     mode: '0644'
    #     force: yes

    - name: 6. Download Kubernetes GPG key
      ansible.builtin.get_url:
        # CAMBIA EL 30 POR EL 31 AQUÍ
        url: https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        mode: '0644'
        force: yes

    # - name: 7. Add Kubernetes apt repository
    #   ansible.builtin.apt_repository:
    #     repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
    #     state: present
    #     filename: kubernetes

    - name: 7. Add Kubernetes apt repository
      ansible.builtin.apt_repository:
        # CAMBIA EL 30 POR EL 31 AQUÍ TAMBIÉN
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v1.31/deb/ /"
        state: present
        filename: kubernetes

    - name: 8. Install kubelet, kubeadm, and kubectl
      ansible.builtin.apt:
        name: [kubelet, kubeadm, kubectl]
        state: present
        update_cache: yes

    - name: 9. Prevent K8s packages from being upgraded automatically
      # This is a best practice to avoid cluster instability
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop: [kubelet, kubeadm, kubectl]

- name: Installing conntrack in every node
  hosts: all
  become: true
  tasks:
    - name: 10. Install conntrack networking utility
      ansible.builtin.apt:
        name: conntrack
        state: present
        update_cache: yes
    - name: 11. Enable IPv4 forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        sysctl_set: yes
        state: present
        reload: yes

- name: Specific Master Node Setup
  hosts: master
  become: true
  tasks:
    - name: 12. Copy kubeadm configuration file to Master
      ansible.builtin.copy:
        # Path to the file on your RHEL VM
        src: kubeadm-config.yaml 
        # Path where it will be saved on the AWS Ubuntu instance
        dest: /home/ubuntu/kubeadm-config.yaml
        owner: ubuntu
        group: ubuntu
        mode: '0644'